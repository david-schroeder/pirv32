version = 1

[[annotations]]
# Documentation files:
path = [
    "README.md",
    "docs/**/*.rst",
    "docs/**/*.svg",
    "examples/README.md",
    "requirements.txt",
]
SPDX-FileCopyrightText = "2026 %PROJECT% contributors"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
# Files where no license header can be placed:
path = [
    "src/design/pincheck/pincheck.csv",
]
SPDX-FileCopyrightText = "2024 RVLab contributors"
SPDX-License-Identifier = "SHL-2.1"


[[annotations]]
# Auto-generated files:
path = [
    "docs/Makefile",
    "docs/make.bat",
    "docs/source/conf.py",
    "docs/build/**",
    "src/design/ip/design.txt",
    "src/design/wave/*.do",
    "src/design/wave/*.xsim.wcfg",
    "**/__pycache__/**"
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
# Boilerplate files:
path = [
    ".gitignore",
    ""
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"
